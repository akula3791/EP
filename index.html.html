<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блог практикующего психолога</title>
    <style>
        /* Базовые стили для красивого блога */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 40px;
        }
        /* Стили для карточки поста */
        .post-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 25px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        /* Стиль для картинок в посте */
        .post-card img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 15px;
            display: block;
        }
        .post-date {
            font-size: 0.85rem;
            color: #95a5a6;
            margin-bottom: 15px;
        }
        /* Анимация загрузки */
        #loader {
            text-align: center;
            font-size: 1.2rem;
            color: #7f8c8d;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Посты психолога</h1>
        
        <!-- Сюда JavaScript будет вставлять мамины посты -->
        <div id="blog-posts">
            <div id="loader">Загрузка свежих публикаций...</div>
        </div>
    </div>

<script>
    // 1. ЗАМЕНИТЕ НА ЮЗЕРНЕЙМ МАМИНОГО КАНАЛА (без знака @ и ссылки t.me/)
    const TELEGRAM_CHANNEL = 'https://t.me/Bagoveeva'; 

    // Используем открытый API-мост для получения постов в формате JSON
    const API_URL = `https://workers.dev{TELEGRAM_CHANNEL}`;

    async function loadTelegramPosts() {
        const postsContainer = document.getElementById('blog-posts');
        
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Ошибка сети');
            
            const posts = await response.json();
            
            // Очищаем загрузчик
            postsContainer.innerHTML = '';

            if (posts.length === 0) {
                postsContainer.innerHTML = '<p style="text-align:center">Постов пока нет.</p>';
                return;
            }

            // Перебираем каждый пост и создаем HTML структуру
            posts.forEach(post => {
                const postElement = document.createElement('article');
                postElement.className = 'post-card';

                // Форматируем дату (превращаем системное время в красивую дату)
                const postDate = new Date(post.date * 1000).toLocaleDateString('ru-RU', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                // Обработка текста: заменяем переносы строк на теги <br>, чтобы текст не слипался
                let formattedText = post.text ? post.text.replace(/\n/g, '<br>') : '';

                // Собираем карточку поста
                let postContent = `
                    <div class="post-date">${postDate}</div>
                    <div class="post-text">${formattedText}</div>
                `;

                // Если в посте есть картинка, добавляем её
                if (post.image) {
                    postContent += `<img src="${post.image}" alt="Иллюстрация к посту">`;
                }

                postElement.innerHTML = postContent;
                postsContainer.appendChild(postElement);
            });

        } catch (error) {
            console.error('Ошибка при загрузке постов:', error);
            postsContainer.innerHTML = '<p style="text-align:center; color:red;">Не удалось загрузить посты. Пожалуйста, обновите страницу позже.</p>';
        }
    }

    // Запускаем функцию при загрузке страницы
    window.addEventListener('DOMContentLoaded', loadTelegramPosts);
</script>

</body>
</html>
