<script>
    // Название маминого канала
    const TELEGRAM_CHANNEL = 'Bagoveeva'; 
    
    // Используем самый стабильный официальный RSS-поток самого Телеграма через открытый конвертер
    const API_URL = `https://rss2json.com{TELEGRAM_CHANNEL}`;

    async function loadTelegramPosts() {
        const postsContainer = document.getElementById('blog-posts');
        
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Ошибка при получении данных');
            
            const data = await response.json();
            postsContainer.innerHTML = '';

            // Проверяем, вернулись ли посты
            if (!data.items || data.items.length === 0) {
                postsContainer.innerHTML = '<p style="text-align:center">Публикаций пока нет.</p>';
                return;
            }

            // Выводим последние посты
            data.items.forEach(item => {
                const postElement = document.createElement('article');
                postElement.className = 'post-card';

                // Форматируем дату публикации
                const postDate = new Date(item.pubDate).toLocaleDateString('ru-RU', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                // Официальный RSS Телеграма отдает текст уже в красивом HTML (сохраняя смайлы и картинки)
                let postContent = `
                    <div class="post-date">${postDate}</div>
                    <div class="post-text">${item.content}</div>
                `;

                postElement.innerHTML = postContent;
                postsContainer.appendChild(postElement);
            });

            // Небольшой трюк: убираем лишние стили кнопок Telegram, если они подтянулись
            const tgButtons = postsContainer.querySelectorAll('.tgme_widget_message_inline_attach');
            tgButtons.forEach(btn => btn.style.display = 'none');

        } catch (error) {
            console.error('Ошибка загрузки:', error);
            postsContainer.innerHTML = '<p style="text-align:center; color:#e74c3c;">Не удалось загрузить посты. Пожалуйста, перезагрузите страницу.</p>';
        }
    }

    // Запуск при полной загрузке страницы
    window.addEventListener('DOMContentLoaded', loadTelegramPosts);
</script>
